<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login - Mothers Pride Playschool</title>
  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <!-- Stylesheet -->
  <link rel="stylesheet" href="admin-login.css" />
</head>

<body>
  <div class="container">
    <form id="adminLoginForm">
      <h2 style="text-align: center; margin-bottom: 20px; color: #2196F3;">Admin Access</h2>
      <label for="username">Username</label>
      <input type="text" id="username" placeholder="Enter username" required /><br />
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Password" required /><br />
      <button type="submit">Login</button>
      <div style="text-align: center; margin-top: 15px;">
        <a href="index.html" style="font-size: 0.85em; color: #1565C0; text-decoration: none;">&larr; Back to Home</a>
      </div>
    </form>
    <div class="ear-l"></div>
    <div class="ear-r"></div>
    <div class="panda-face">
      <div class="blush-l"></div>
      <div class="blush-r"></div>
      <div class="eye-l">
        <div class="eyeball-l"></div>
      </div>
      <div class="eye-r">
        <div class="eyeball-r"></div>
      </div>
      <div class="nose"></div>
      <div class="mouth"></div>
    </div>
    <div class="hand-l"></div>
    <div class="hand-r"></div>
    <div class="paw-l"></div>
    <div class="paw-r"></div>
  </div>
  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="admin-login.js"></script>
</body>

</html>
